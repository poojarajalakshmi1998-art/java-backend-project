spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8084
          predicates:
            - Path=/auth/**,/orders/**

        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/order/**

        - id: payment-service
          uri: http://localhost:8082
          predicates:
            - Path=/payments/**,/webhooks/**
  application:
    name: api-gateway
server:
  port: 8085




