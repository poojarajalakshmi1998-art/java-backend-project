services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres-auth:
    image: postgres
    container_name: postgres-auth
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: KrishPooja@0703
    ports:
      - "5433:5432"
   
  postgres-order:
    image: postgres
    container_name: postgres-order
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: KrishPooja@0703
    ports:
      - "5434:5432"
   

  postgres-payment:
    image: postgres
    container_name: postgres-payment
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: KrishPooja@0703
    ports:
      - "5435:5432"
    
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"


  auth-service:
    image: poojakrish/auth-service
    container_name: auth-service
    depends_on:
      - postgres-auth
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  order-service:
    image: poojakrish/order-service
    container_name: order-service
    depends_on:
      - postgres-order
      - kafka
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  payment-service:
    image: poojakrish/payment-service
    container_name: payment-service
    depends_on:
      - postgres-payment
      - kafka
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  notification-service:
    image: poojakrish/notification-service
    container_name: notification-service
    depends_on:
      - mongo
      - kafka
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  api-gateway:
    image: poojakrish/api-gateway
    container_name: api-gateway
    depends_on:
      - auth-service
      - order-service
      - payment-service
      - notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker

